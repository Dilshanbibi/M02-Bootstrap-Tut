<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap UI/UX Tutorial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <div class="container mt-5">

    <!-- Title -->
    <h1 class="text-center mb-4">My Bootstrap Website</h1>

    <!-- Alert (Technique 1) -->
    <div class="alert alert-success text-center">
      Welcome! This webpage is built using Bootstrap 5.
    </div>

    <!-- Buttons (Technique 2) -->
    <div class="text-center mb-4">
      <button class="btn btn-primary">Primary Button</button>
      <button class="btn btn-danger">Danger Button</button>
      <button class="btn btn-warning">Warning Button</button>
    </div>

    <!-- Grid System (Technique 3) -->
    <div class="row text-center mb-4">
      <div class="col-md-4 bg-light p-3 border">
        Column 1
      </div>
      <div class="col-md-4 bg-secondary text-white p-3 border">
        Column 2
      </div>
      <div class="col-md-4 bg-light p-3 border">
        Column 3
      </div>
    </div>

    <!-- Badges (Technique 4 - extra) -->
    <div class="text-center">
      <h4>
        Notifications <span class="badge bg-danger">3</span>
      </h4>
    </div>

  </div>

</body>
</html>
